version: "4.1"
name: G3507_StepMotor_Driver
type: ARM
deviceName: MSPM0G3507
packDir: .pack/TexasInstruments/MSPM0G_DFP.1.2.1
srcDirs:
  - Source
virtualFolder:
  name: <virtual_root>
  files:
    - path: ti_msp_dl_config.h
  folders:
    - name: DriverLib
      files:
        - path: MDK-ARM/driverlib.a
        - path: MDK-ARM/startup_mspm0g350x_uvision.s
        - path: ti_msp_dl_config.c
      folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 84430b64c41a8b3dd13e197feedf1263
targets:
  gpio_toggle_output_LP_MSPM0G3507_nortos_keil:
    cppPreprocessAttrs:
      defineList:
        - __MSPM0G3507__
        - _TMC_TIMER_
      incList:
        - .
        - Source/Inc
        - .cmsis/include
        - MDK-ARM
        - f:/TI/mspm0_sdk_2_09_00_01/source
      libList: []
    excludeList: []
    toolchain: AC6
    toolchainConfigMap:
      AC6:
        archExtensions: ""
        cpuType: Cortex-M0+
        floatingPointHardware: none
        options:
          version: 3
          afterBuildTasks: []
          asm-compiler:
            $use: asm-auto
          beforeBuildTasks:
            - name: cmd.exe /C "$P../../../../../../tools/keil/syscfg.bat '$P' gpio_toggle_output.syscfg"
              abortAfterFailed: true
              command: cd .\MDK-ARM && cmd.exe /C "$P../../../../../../tools/keil/syscfg.bat '$P' gpio_toggle_output.syscfg"
              disable: true
              stopBuildAfterFailed: true
          c/cpp-compiler:
            language-c: c99
            language-cpp: c++11
            link-time-optimization: true
            one-elf-section-per-function: true
            optimization: level-0
            short-enums#wchar: true
            warnings: misra-compatible
          global:
            output-debug-info: enable
            use-microLIB: true
          linker:
            $outputTaskExcludes:
              - .bin
            misc-controls: --diag_suppress=L6329
            output-format: elf
        scatterFilePath: D:\Documents\EmbbedIDE\MSPM0G3507\G3507_StepMotor_Driver\MDK-ARM\mspm0g3507.sct
        storageLayout:
          RAM:
            - id: 1
              isChecked: true
              mem:
                size: "0x5000"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: true
              isStartup: true
              mem:
                size: "0x10000"
                startAddr: "0x08000000"
              tag: IROM
        useCustomScatterFile: true
    uploadConfigMap:
      Custom:
        bin: ""
        commandLine: ""
        eraseChipCommand: ""
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: MSPM0G3507
          vendor: TI
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: jlink
        target: ti_mspm0
      STLink:
        address: "0x08000000"
        bin: ""
        elFile: None
        optionBytes: .eide/gpio_toggle_output_lp_mspm0g3507_nortos_keil.st.option.bytes.ini
        otherCmds: ""
        proType: SWD
        resetMode: default
        runAfterProgram: true
        speed: 4000
    uploader: JLink
